<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - Signature de Documents</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .auth-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 450px;
            width: 100%;
        }

        .auth-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .auth-header h1 {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-size: 2em;
            margin-bottom: 10px;
        }

        .auth-header p {
            color: #666;
        }

        .auth-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }

        .auth-tab {
            flex: 1;
            padding: 12px;
            border: 2px solid #ddd;
            background: white;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .auth-tab.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: #667eea;
        }

        .auth-form {
            display: none;
        }

        .auth-form.active {
            display: block;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1em;
            transition: border-color 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .auth-button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .auth-button:hover {
            transform: translateY(-2px);
        }

        .auth-button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .auth-message {
            margin-top: 15px;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            font-weight: 600;
            display: none;
        }

        .auth-message.success {
            background: #d4edda;
            color: #155724;
        }

        .auth-message.error {
            background: #f8d7da;
            color: #721c24;
        }

        .auth-footer {
            margin-top: 30px;
            text-align: center;
            color: #666;
            font-size: 0.9em;
        }

        .password-toggle {
            position: relative;
        }

        .password-toggle-btn {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1.2em;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h1>📝 Signature de Documents</h1>
                <p>Connectez-vous pour accéder à l'application</p>
            </div>

            <!-- Tabs -->
            <div class="auth-tabs">
                <button class="auth-tab active" data-tab="login">Connexion</button>
                <button class="auth-tab" data-tab="signup">Inscription</button>
            </div>

            <!-- Formulaire de connexion -->
            <form id="login-form" class="auth-form active">
                <div class="form-group">
                    <label for="login-email">Email</label>
                    <input type="email" id="login-email" placeholder="votre@email.com" required>
                </div>

                <div class="form-group">
                    <label for="login-password">Mot de passe</label>
                    <div class="password-toggle">
                        <input type="password" id="login-password" placeholder="••••••••" required>
                        <button type="button" class="password-toggle-btn" onclick="togglePassword('login-password')">
                            👁️
                        </button>
                    </div>
                </div>

                <button type="submit" class="auth-button" id="login-btn">
                    Se connecter
                </button>

                <div id="login-message" class="auth-message"></div>
            </form>

            <!-- Formulaire d'inscription -->
            <form id="signup-form" class="auth-form">
                <div class="form-group">
                    <label for="signup-name">Nom complet</label>
                    <input type="text" id="signup-name" placeholder="Jean Dupont" required>
                </div>

                <div class="form-group">
                    <label for="signup-email">Email</label>
                    <input type="email" id="signup-email" placeholder="votre@email.com" required>
                </div>

                <div class="form-group">
                    <label for="signup-password">Mot de passe</label>
                    <div class="password-toggle">
                        <input type="password" id="signup-password" placeholder="Min. 6 caractères" required minlength="6">
                        <button type="button" class="password-toggle-btn" onclick="togglePassword('signup-password')">
                            👁️
                        </button>
                    </div>
                </div>

                <div class="form-group">
                    <label for="signup-password-confirm">Confirmer le mot de passe</label>
                    <div class="password-toggle">
                        <input type="password" id="signup-password-confirm" placeholder="••••••••" required minlength="6">
                        <button type="button" class="password-toggle-btn" onclick="togglePassword('signup-password-confirm')">
                            👁️
                        </button>
                    </div>
                </div>

                <button type="submit" class="auth-button" id="signup-btn">
                    Créer un compte
                </button>

                <div id="signup-message" class="auth-message"></div>
            </form>

            <div class="auth-footer">
                <p>Vos données sont sécurisées et chiffrées</p>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-client.js"></script>
    <script src="auth.js"></script>
</body>
</html>
