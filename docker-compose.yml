services:
  sign-app:
    build: .
    image: sign-app
    container_name: sign-app
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      NODE_ENV: production
      # Identifiants email pour l'envoi des documents signés.
      # Définis-les dans un fichier .env (voir .env.example) ou dans ton shell.
      EMAIL_SERVICE: ${EMAIL_SERVICE:-gmail}
      EMAIL_USER: ${EMAIL_USER:-}
      EMAIL_PASSWORD: ${EMAIL_PASSWORD:-}
      # Optionnel : configuration SMTP personnalisée
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-}
      SMTP_SECURE: ${SMTP_SECURE:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
